name: Local Verification Contract

on:
    schedule:
        -   cron: '0 2 * * *'
    workflow_dispatch:

jobs:
    contract:
        name: Validate local-only test governance
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6

            -   name: Validate local verification contract
                run: bash ./scripts/verify-local.sh --validate-only

            -   name: Explain local-only verification lanes
                shell: bash
                run: |
                    printf 'GitHub Actions does not run deterministic, integration, or live test lanes.\n'
                    printf 'Use scripts/test-lane.ps1 or scripts/test-lane.sh in a controlled local or agent environment.\n'
                    printf 'Update .sisyphus/evidence/local-verification.manifest.json after refreshing local evidence.\n'
