name: "CodeQL"

on:
    push:
        branches: [ "main", "master" ]
    pull_request:
        branches: [ "main", "master" ]
    schedule:
        -   cron: '30 18 * * 4'

jobs:
    contract:
        name: Build and contract gate
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6

            -   name: Setup .NET SDK
                uses: actions/setup-dotnet@v5
                with:
                    dotnet-version: 10.x

            -   name: Restore dependencies
                run: dotnet restore AioTieba4DotNet.sln --nologo

            -   name: Build solution
                run: dotnet build AioTieba4DotNet.sln --configuration Release --no-restore --nologo

            -   name: Regenerate protobuf outputs
                run: dotnet run --project ProtoGenerator/ProtoGenerator.csproj

            -   name: Check generator consistency
                shell: bash
                run: |
                    if [[ -n "$(git status --short --untracked-files=all -- AioTieba4DotNet)" ]]; then
                        git status --short --untracked-files=all -- AioTieba4DotNet
                        printf 'Generated protobuf outputs are out of date.\n'
                        exit 1
                    fi

            -   name: Validate local verification contract
                run: bash ./scripts/verify-local.sh --validate-only

            -   name: Verify package can be packed
                run: dotnet pack AioTieba4DotNet/AioTieba4DotNet.csproj --configuration Release --no-build --output ./artifacts --nologo

    analyze:
        name: Analyze
        runs-on: ubuntu-latest
        needs: contract
        permissions:
            actions: read
            contents: read
            security-events: write

        strategy:
            fail-fast: false
            matrix:
                language: [ 'csharp' ]

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6

            -   name: Setup .NET SDK
                uses: actions/setup-dotnet@v5
                with:
                    dotnet-version: 10.x

            -   name: Initialize CodeQL
                uses: github/codeql-action/init@v3
                with:
                    languages: ${{ matrix.language }}
                    queries: security-extended,security-and-quality
                    config-file: .github/codeql/config.yml

            -   name: Restore dependencies
                run: dotnet restore --nologo

            -   name: Build
                run: dotnet build --configuration Release --no-restore

            -   name: Perform CodeQL Analysis
                uses: github/codeql-action/analyze@v3
                with:
                    category: "/language:${{matrix.language}}"
                    upload: failure-only
                    output: ${{ runner.temp }}/codeql-sarif

            -   name: Filter SARIF
                uses: advanced-security/filter-sarif@59d0a64b3c0a34d787819f6659708915b6210582
                with:
                    patterns: |
                        -**/Protobuf/**
                        -**/protobuf/**
                        -AioTieba4DotNet.Tests/**
                        -ProtoGenerator/**
                    input: ${{ runner.temp }}/codeql-sarif/${{ matrix.language }}.sarif
                    output: ${{ runner.temp }}/codeql-sarif/${{ matrix.language }}.sarif

            -   name: Upload SARIF
                uses: github/codeql-action/upload-sarif@v3
                with:
                    sarif_file: ${{ runner.temp }}/codeql-sarif/${{ matrix.language }}.sarif
