name: Publish to NuGet

on:
    push:
        tags:
            - 'v*.*.*'  # 监听以 v 开头的标签推送

jobs:
    verify:
        name: Verify release lane (${{ matrix.framework }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                framework: [ net8.0, net9.0, net10.0 ]

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Setup .NET SDK
                uses: actions/setup-dotnet@v5
                with:
                    dotnet-version: |
                        8.x
                        9.x
                        10.x

            -   name: Restore dependencies
                run: dotnet restore AioTieba4DotNet.sln --nologo

            -   name: Build solution
                run: dotnet build AioTieba4DotNet.sln --configuration Release --no-restore --nologo

            -   name: Run deterministic tests for ${{ matrix.framework }}
                run: dotnet test AioTieba4DotNet.Tests/AioTieba4DotNet.Tests.csproj --configuration Release --no-build -f ${{ matrix.framework }} --filter "TestCategory!=Integration&TestCategory!=Live" --nologo

    generator-consistency:
        name: Verify generated protobuf outputs
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Setup .NET SDK
                uses: actions/setup-dotnet@v5
                with:
                    dotnet-version: |
                        8.x
                        9.x
                        10.x

            -   name: Restore dependencies
                run: dotnet restore AioTieba4DotNet.sln --nologo

            -   name: Regenerate protobuf outputs
                run: dotnet run --project ProtoGenerator/ProtoGenerator.csproj

            -   name: Check generator consistency
                shell: bash
                run: |
                    if [[ -n "$(git status --short --untracked-files=all -- AioTieba4DotNet)" ]]; then
                        git status --short --untracked-files=all -- AioTieba4DotNet
                        echo "Generated protobuf outputs are out of date."
                        exit 1
                    fi

    migration-docs:
        name: Verify migration docs exist
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Check release migration artifacts
                shell: bash
                run: |
                    required_files=(
                        docs/migration-v1-to-v2.md
                        docs/release-notes-v2.md
                    )

                    missing=0
                    for file in "${required_files[@]}"; do
                        if [[ ! -f "$file" ]]; then
                            echo "Missing required release artifact: $file"
                            missing=1
                        fi
                    done

                    if (( missing != 0 )); then
                        exit 1
                    fi

                    printf 'Found release artifacts:\n'
                    printf ' - %s\n' "${required_files[@]}"

    publish:
        runs-on: ubuntu-latest
        needs:
            - verify
            - generator-consistency
            - migration-docs
        permissions:
            contents: write

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6
                with:
                    fetch-depth: 0

            -   name: Setup .NET SDK
                uses: actions/setup-dotnet@v5
                with:
                    dotnet-version: |
                        8.x
                        9.x
                        10.x

            -   name: Extract version
                shell: bash
                run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

            -   name: Determine release channel
                shell: bash
                run: |
                    if [[ "${VERSION}" =~ -(preview|rc)\.[0-9]+$ ]]; then
                        echo "PRERELEASE=true" >> $GITHUB_ENV
                    else
                        echo "PRERELEASE=false" >> $GITHUB_ENV
                    fi

            -   name: Restore dependencies
                run: dotnet restore --nologo

            -   name: Build the project
                run: dotnet build --configuration Release --no-restore -p:Version=${{ env.VERSION }} --nologo

            -   name: Pack the project
                run: dotnet pack --configuration Release --no-build --output ./nupkg -p:Version=${{ env.VERSION }} --nologo

            -   name: Push to NuGet
                run: dotnet nuget push ./nupkg/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
                env:
                    NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

            -   name: Create Release
                uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
                with:
                    files: |
                        ./nupkg/*.nupkg
                        ./nupkg/*.snupkg
                    generate_release_notes: true
                    draft: false
                    prerelease: ${{ env.PRERELEASE == 'true' }}
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
