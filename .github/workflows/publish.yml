name: Publish to NuGet

on:
    push:
        tags:
            - 'v*.*.*'

jobs:
    build:
        name: Build release lane
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Setup .NET SDK
                uses: actions/setup-dotnet@v5
                with:
                    dotnet-version: 10.x

            -   name: Restore dependencies
                run: dotnet restore AioTieba4DotNet.sln --nologo

            -   name: Build solution
                run: dotnet build AioTieba4DotNet.sln --configuration Release --no-restore --nologo

    generator-consistency:
        name: Verify generated protobuf outputs
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Setup .NET SDK
                uses: actions/setup-dotnet@v5
                with:
                    dotnet-version: 10.x

            -   name: Restore dependencies
                run: dotnet restore AioTieba4DotNet.sln --nologo

            -   name: Regenerate protobuf outputs
                run: dotnet run --project ProtoGenerator/ProtoGenerator.csproj

            -   name: Check generator consistency
                shell: bash
                run: |
                    if [[ -n "$(git status --short --untracked-files=all -- AioTieba4DotNet)" ]]; then
                        git status --short --untracked-files=all -- AioTieba4DotNet
                        printf 'Generated protobuf outputs are out of date.\n'
                        exit 1
                    fi

    release-contracts:
        name: Validate release docs and evidence contract
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Validate local verification contract
                run: bash ./scripts/verify-local.sh --validate-only

    package:
        name: Package release artifacts
        runs-on: ubuntu-latest
        needs:
            - build
            - generator-consistency
            - release-contracts
        outputs:
            version: ${{ steps.version.outputs.version }}
            prerelease: ${{ steps.version.outputs.prerelease }}

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Setup .NET SDK
                uses: actions/setup-dotnet@v5
                with:
                    dotnet-version: 10.x

            -   name: Preflight release tag version
                id: version
                shell: bash
                run: |
                    VERSION="${GITHUB_REF_NAME#v}"

                    if [[ ! "$VERSION" =~ ^3\.0\.0(-(preview|rc)\.[0-9]+)?$ ]]; then
                        printf "Release tag '%s' produced VERSION='%s'.\n" "$GITHUB_REF_NAME" "$VERSION"
                        printf 'Expected v3.0.0, v3.0.0-preview.N, or v3.0.0-rc.N so the v3 release line only publishes preview, rc, and GA cutover tags.\n'
                        exit 1
                    fi

                    if [[ "$VERSION" =~ -(preview|rc)\.[0-9]+$ ]]; then
                        PRERELEASE=true
                    else
                        PRERELEASE=false
                    fi

                    printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
                    printf 'prerelease=%s\n' "$PRERELEASE" >> "$GITHUB_OUTPUT"

            -   name: Restore dependencies
                run: dotnet restore --nologo

            -   name: Build the project
                run: dotnet build --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }} --nologo

            -   name: Pack the project
                run: dotnet pack --configuration Release --no-build --output ./nupkg -p:Version=${{ steps.version.outputs.version }} --nologo

            -   name: Validate packed artifacts
                shell: bash
                run: bash ./.github/scripts/validate-package-artifacts.sh "./nupkg" "AioTieba4DotNet.${{ steps.version.outputs.version }}"

            -   name: Upload package artifacts
                uses: actions/upload-artifact@v4
                with:
                    name: nuget-package-${{ steps.version.outputs.version }}
                    path: ./nupkg/*
                    if-no-files-found: error

    publish:
        # `.github/workflows/publish.yml` is part of the external nuget.org trusted publishing contract.
        # If this workflow file is renamed, the nuget.org trusted publishing policy must be updated to match `publish.yml`.
        runs-on: ubuntu-latest
        needs:
            - package
        permissions:
            contents: write
            id-token: write

        steps:
            -   name: Download package artifacts
                uses: actions/download-artifact@v4
                with:
                    name: nuget-package-${{ needs.package.outputs.version }}
                    path: ./nupkg

            -   name: Login to NuGet
                id: login
                uses: NuGet/login@v1

            -   name: Push to NuGet
                run: dotnet nuget push ./nupkg/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

            -   name: Create Release
                uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
                with:
                    files: |
                        ./nupkg/*.nupkg
                        ./nupkg/*.snupkg
                    generate_release_notes: true
                    draft: false
                    prerelease: ${{ needs.package.outputs.prerelease == 'true' }}
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
